<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentinel | Smart Money Flow</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { margin: 0; background: #0a0e17; color: #fff; font-family: sans-serif; display: flex; height: 100vh; }
        #sidebar { width: 350px; border-right: 1px solid #333; padding: 15px; overflow-y: auto; }
        #chart-container { flex-grow: 1; padding: 15px; }
        .log-item { border-bottom: 1px solid #222; padding: 8px 0; font-size: 12px; }
        .inflow { color: #10b981; } .outflow { color: #ef4444; }
        .stat-box { background: #161b22; padding: 10px; margin-bottom: 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>SMART MONEY FLOW</h3>
    <div id="stats">
        <div class="stat-box">Net Flow (1h): <span id="net-flow" class="inflow">+$12.4M</span></div>
    </div>
    <div id="tx-log"></div>
</div>

<div id="chart-container"><div id="chart"></div></div>

<script>
    const chart = LightweightCharts.createChart(document.getElementById('chart'), {
        width: 1000, height: 600, layout: { backgroundColor: '#0a0e17', textColor: '#ddd' }
    });
    const candleSeries = chart.addCandlestickSeries();
    
    // Имитация детекции китов
    function updateData(price, volume, isBuy) {
        const time = Math.floor(Date.now() / 1000);
        candleSeries.update({ time, open: price-2, high: price+5, low: price-5, close: price });
        
        if (volume > 500000) { // Порог "Умных денег"
            const type = isBuy ? 'INFLOW' : 'OUTFLOW';
            const color = isBuy ? 'inflow' : 'outflow';
            const log = document.getElementById('tx-log');
            log.innerHTML = `<div class="log-item ${color}">
                ${type}: $${(volume/1000000).toFixed(2)}M at $${price}<br>
                Target: $${(price + (isBuy ? 50 : -50)).toFixed(2)}
            </div>` + log.innerHTML;
        }
    }

    // Симуляция потока данных
    setInterval(() => updateData(65000 + Math.random()*100, Math.random()*1000000, Math.random() > 0.5), 2000);
</script>
</body>
</html>
